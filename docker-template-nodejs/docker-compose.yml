version: "3.9"

services:

  mongodb:
    image: mongo:8
    container_name: mongodb
    restart: unless-stopped

    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}

    volumes:
      - mongodb_data:/data/db

    networks:
      - mern-network

    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile

    container_name: backend

    restart: unless-stopped

    env_file:
      - .env

    depends_on:
      mongodb:
        condition: service_healthy

    expose:
      - "5000"

    networks:
      - mern-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile

    container_name: frontend

    restart: unless-stopped

    expose:
      - "80"

    depends_on:
      - backend

    networks:
      - mern-network

  nginx:
    image: nginx:alpine

    container_name: nginx

    restart: unless-stopped

    depends_on:
      - frontend
      - backend

    ports:
      - "80:80"
      - "443:443"

    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro

      # SSL Certificates
      # - ./ssl:/etc/nginx/ssl:ro

    networks:
      - mern-network

networks:
  mern-network:

volumes:
  mongodb_data:
