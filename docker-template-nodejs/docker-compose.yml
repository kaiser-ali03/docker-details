services:

  mongodb:
    image: mongo:7
    container_name: mongodb
    restart: always

    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123

    ports:
      - "27017:27017"

    volumes:
      - mongo_data:/data/db

    networks:
      - mern-network

  nginx:
    image: nginx:latest
    container_name: nginx
    restart: always

    ports:
      - "80:80"

    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf

    depends_on:
      - frontend
      - backend

    networks:
      - mern-network

  backend:
    build:
      context: ./backend

    container_name: backend
    restart: always
    depends_on:
      - mongodb
    ports:
      - "5000:5000"

    environment:
      PORT: 5000
      MONGO_URI: mongodb://admin:admin123@mongodb:27017/mydatabase?authSource=admin

    networks:
      - mern-network

  frontend:
    build:
      context: ./frontend
    container_name: frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "3000:80"
    networks:
      - mern-network

networks:
  mern-network:

volumes:
  mongo_data:

